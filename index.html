<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makers Department | Industrial Design Consultancy</title>
<meta name="description" content="Makers Department is a founder-friendly industrial design consultancy. We help engineering-led hardware teams in IoT, medtech, robotics and consumer electronics go from working prototype to market-ready product.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
  }

  body {
    background-color: #0D0C10;
    color: #F5F2EE;
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 5.5vw 5vw;
    position: relative;
    overflow: hidden;
  }

  /* ── TOP META ── */
  .meta-top {
    position: absolute;
    top: 5.5vw;
    left: 5vw;
    right: 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .meta-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(7px, 0.9vw, 11px);
    letter-spacing: 0.25em;
    color: #2A2530;
  }

  /* ── LOGO ── */
  .logo {
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .logo__makers {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    font-size: clamp(60px, 15.5vw, 15.5vw);
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: #F5F2EE;
    white-space: nowrap;
    display: block;
  }

  .logo__rule-row {
    display: flex;
    align-items: center;
    gap: 1vw;
    margin-top: 0.5vw;
    width: 100%;
  }

  .logo__rule {
    height: 2px;
    background-color: #7B2FFF;
  }
  .logo__rule--left { flex: 1 1 0; min-width: 0; }
  .logo__rule--right { width: 2.5vw; flex-shrink: 0; }

  .logo__dept {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(8px, 1.6vw, 1.6vw);
    letter-spacing: 0.35em;
    color: #7B2FFF;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── TAGLINE ── */
  .tagline {
    margin-top: 2vw;
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: clamp(9px, 1.2vw, 1.2vw);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3A3545;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 4vw;
    height: 1px;
    background-color: #1E1A28;
    margin: 2.2vw 0;
  }

  /* ── CONTACT BLOCK ── */
  .contact {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: clamp(11px, 1.3vw, 1.3vw);
    line-height: 1.9;
    color: #3A3545;
    max-width: 55%;
  }

  @media (max-width: 600px) {
    .contact { max-width: 100%; }
  }

  .contact__intro { color: #555060; }

  a {
    color: #7B2FFF;
    text-decoration: none;
    border-bottom: 1px solid rgba(123,47,255,0.3);
    padding-bottom: 1px;
    transition: border-color 0.2s;
  }
  a:hover { border-color: #7B2FFF; }

  /* ── BOTTOM ROW ── */
  .meta-bottom {
    position: absolute;
    bottom: 5.5vw;
    left: 5vw;
    right: 5vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .meta-bottom__email {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(7px, 0.9vw, 11px);
    letter-spacing: 0.25em;
    color: #7B2FFF;
    text-decoration: none;
    border: none;
    padding: 0;
  }
  .meta-bottom__email:hover { border: none; }

  .meta-bottom__right {
    display: flex;
    align-items: center;
    gap: 1.5vw;
  }

  .social-icon {
    display: flex;
    align-items: center;
    opacity: 0.35;
    transition: opacity 0.2s;
    border: none;
    padding: 0;
  }
  .social-icon:hover { opacity: 1; border: none; }

  .meta-bottom__url {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(7px, 0.9vw, 11px);
    letter-spacing: 0.25em;
    color: #2A2530;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .logo__makers {
      font-size: clamp(60px, 15.5vw, 15.5vw);
    }
    .meta-top .meta-label:first-child {
      content: 'Founded London · Lisbon';
    }
  }
</style>
</head>
<body>

  <!-- TOP META -->
  <div class="meta-top">
    <span class="meta-label" id="founded-label">Founded in London · Operating from Lisbon</span>
    <span class="meta-label">Est. 2016</span>
  </div>

  <!-- LOGO -->
  <div class="logo">
    <span class="logo__makers">Makers</span>
    <div class="logo__rule-row">
      <div class="logo__rule logo__rule--left"></div>
      <span class="logo__dept">Department</span>
      <div class="logo__rule logo__rule--right"></div>
    </div>
  </div>

  <!-- TAGLINE -->
  <div class="tagline">Industrial Design Consultancy</div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- CONTACT BLOCK -->
  <div class="contact">
    <span class="contact__intro">New website is in the works. </span>
    <span>For new project enquiries — </span>
    <a href="mailto:makersdepartment@gmail.com">email us</a>
    <span> or </span>
    <a href="https://calendar.app.google/BX7oAqHSHxMpu7866" target="_blank" rel="noopener noreferrer">request a brief call</a>
    <span>.</span>
    <br>
    <span>For more — follow us on </span>
    <a href="https://www.linkedin.com/company/10312547/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <span> or </span>
    <a href="https://www.youtube.com/channel/UCAXoUrGAnq2vTw7AuPqBwSw" target="_blank" rel="noopener noreferrer">YouTube</a>
    <span>.</span>
  </div>

  <!-- BOTTOM ROW -->
  <div class="meta-bottom">
    <a href="mailto:makersdepartment@gmail.com" class="meta-bottom__email">makersdepartment@gmail.com</a>
    <div class="meta-bottom__right">
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/company/10312547/" target="_blank" rel="noopener noreferrer" class="social-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" fill="#F5F2EE"/>
          <rect x="2" y="9" width="4" height="12" fill="#F5F2EE"/>
          <circle cx="4" cy="4" r="2" fill="#F5F2EE"/>
        </svg>
      </a>
      <!-- YouTube -->
      <a href="https://www.youtube.com/channel/UCAXoUrGAnq2vTw7AuPqBwSw" target="_blank" rel="noopener noreferrer" class="social-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#F5F2EE"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#0D0C10"/>
        </svg>
      </a>
      <span class="meta-bottom__url">makersdepartment.com</span>
    </div>
  </div>

  <script>
    // Shorten label on mobile
    function updateLabel() {
      const el = document.getElementById('founded-label');
      if (window.innerWidth < 600) {
        el.textContent = 'Founded London · Lisbon';
      } else {
        el.textContent = 'Founded in London · Operating from Lisbon';
      }
    }
    updateLabel();
    window.addEventListener('resize', updateLabel);
  </script>

</body>
</html>
